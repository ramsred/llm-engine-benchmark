project:
  model: openai/gpt-oss-20b
  model_revision: null
  tokenizer_revision: null
  trust_remote_code: false
  seed: 20250308
  input_tokens: 120000
  output_tokens: 512
  context_length: 131072
  shared_prefix_tokens: 100000
  warm_groups: 10
  samples: 100
  repetitions: 3
  concurrency: [1, 2, 4]
  cache_modes: [cold, warm_shared]
  engines: [vllm, sglang, tensorrt_llm]
  run_order: alternate
  readiness_timeout_seconds: 3600
  request_timeout_seconds: 3600
  cooldown_seconds: 60
  save_outputs: true
  require_server_token_usage: true
  gpus: all

paths:
  data_dir: data
  results_dir: results
  lock_file: experiment.lock.json
  hf_cache_dir: ${HOME}/.cache/huggingface
  vllm_cache_dir: ${HOME}/.cache/vllm
  triton_cache_dir: ${HOME}/.cache/triton
  sglang_cache_dir: ${HOME}/.cache/sglang

sources:
  ruler:
    repo_url: https://github.com/NVIDIA/RULER.git
    revision: main
    fetch_upstream_source: true
  infinitebench:
    repo_id: xinrongzhang2022/InfiniteBench
    revision: main
  longbench_v2:
    repo_id: THUDM/LongBench-v2
    revision: main

normalization:
  instruction_reserve_tokens: 1024
  max_source_context_chars: 4000000
  extra_source_tokens: 4096
  controlled_distractor_min_chars: 640000
  validation_first_tokens: 256
  prefix_boundary_candidates:
    - "\u001e"
    - "\n\u001e\n"
    - "\n\n<<<UNIQUE_SUFFIX>>>\n"
    - "\n--- UNIQUE SUFFIX ---\n"
    - " § "

engines:
  vllm:
    image: nvcr.io/nvidia/vllm:26.06-py3
    container_name: llmbench-vllm
    host_port: 8000
    container_port: 8000
    gpu_memory_utilization: 0.80
    max_num_batched_tokens: 8192
    kv_cache_dtype: fp8_e4m3
    kv_cache_dtype_skip_layers: sliding_window
    dtype: bfloat16
    quantization: mxfp4
    generation_config: vllm
    extra_args: []
    request_extra:
      ignore_eos: true
      add_special_tokens: false
      skip_special_tokens: false
      stream_options:
        include_usage: true
  sglang:
    image: lmsysorg/sglang@sha256:00c53fe4c31bf22d7b37537f28bbdfd924c02de13cdfb4bff7378c9c34d75ab2
    container_name: llmbench-sglang
    host_port: 30000
    container_port: 30000
    mem_fraction_static: 0.80
    chunked_prefill_size: 8192
    kv_cache_dtype: fp8_e4m3
    dtype: bfloat16
    quantization: mxfp4
    extra_args:
      - --enable-metrics
      - --enable-cache-report
      - --sampling-defaults
      - openai
    request_extra:
      ignore_eos: true
      add_special_tokens: false
      skip_special_tokens: false
      stream_options:
        include_usage: true
  tensorrt_llm:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc21
    container_name: llmbench-tensorrt-llm
    host_port: 8001
    container_port: 8000
    backend: pytorch
    max_batch_size: 4
    max_num_tokens: 8192
    kv_cache_free_gpu_memory_fraction: 0.80
    kv_cache_dtype: fp8
    dtype: bfloat16
    quantization: mxfp4
    extra_args: []
    request_extra:
      ignore_eos: true
      add_special_tokens: false
      skip_special_tokens: false
      stream_options:
        include_usage: true
telemetry:
  enabled: true
  interval_seconds: 1.0
  nvidia_dmon: true
  pidstat: true
  psutil: true
